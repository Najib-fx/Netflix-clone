<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">

        <nav class="navbar container">
            <img src="imgs/netflix logo.png" alt="" srcset="">
            <button class="btn btn-sign">Sign In</button>
        </nav>
                <div class="contents">
        <section class="main">
            <h1>Unlimited movies, TV <br> shows, and more</h1>
            <h4>Starts at US$2.99. Cancel anytime.</h4>
            <h4>Ready to watch? Enter your email to create or restart your <br>membership.</h4>
            <div class="login">
            <input type="email" name="email" id="email" class="main-email" placeholder="Email address">
            <button class="btn btn-login">Get Started ></button>
            </div>

        </section>
        </div>
    </header>
    <section class="trending-now">
